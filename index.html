<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Scanner Pro | v2.2 Smart Check</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        #reader { border: none !important; }
        #reader__scan_region video { 
            border-radius: 24px !important; 
            object-fit: cover !important;
        }
        #reader button { display: none !important; }
        .scan-frame { border: 2px solid rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-blue-500/30">

    <main class="flex-grow p-4 max-w-lg mx-auto w-full space-y-5">
        <div class="text-center pt-2">
            <h1 class="text-3xl font-black tracking-tight text-white">SCANNER <span class="text-blue-500">PRO</span></h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] font-bold">v2.2 • Duplicate Protection</p>
        </div>

        <div class="relative group">
            <div id="reader" class="overflow-hidden rounded-[2.5rem] border-4 border-slate-800 bg-slate-900 shadow-2xl"></div>
            <div id="scan-indicator" class="hidden absolute top-5 right-5 px-3 py-1 bg-blue-600 rounded-full animate-pulse shadow-lg">
                <span class="text-[10px] text-white font-bold uppercase">Live</span>
            </div>
        </div>

        <div id="control-panel" class="grid grid-cols-1 gap-3">
            <button id="btn-start" onclick="startScanner()" class="w-full h-16 bg-blue-600 hover:bg-blue-500 active:scale-95 text-white rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3">
                <span class="text-lg font-bold">START SCANNING</span>
            </button>
            <button id="btn-stop" onclick="stopScanner()" class="hidden w-full h-16 bg-slate-800 hover:bg-red-900/40 border border-slate-700 active:scale-95 text-slate-300 rounded-2xl transition-all flex items-center justify-center gap-3">
                <span class="text-lg font-bold text-red-500">STOP</span>
            </button>
        </div>

        <div id="result-container" class="bg-slate-900/80 p-5 rounded-3xl border border-slate-800 shadow-inner transition-all duration-300">
            <div class="flex justify-between items-center mb-2">
                <span id="status-label" class="text-[10px] font-black text-slate-500 uppercase">Status</span>
                <span id="count-badge" class="px-2 py-0.5 bg-blue-600 text-white text-[10px] rounded-md font-bold">Total: 0</span>
            </div>
            <div id="result-display" class="text-xl font-mono text-slate-400 break-all leading-tight min-h-[50px] flex items-center justify-center text-center">
                Waiting for input...
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="exportToCSV()" class="h-14 bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 hover:bg-emerald-600 hover:text-white rounded-2xl transition-all active:scale-95 flex items-center justify-center font-bold">CSV EXPORT</button>
            <button onclick="resetLogs()" class="h-14 bg-slate-800/50 border border-slate-700 text-slate-500 hover:text-red-400 rounded-2xl transition-all active:scale-95 flex items-center justify-center font-bold">CLEAR</button>
        </div>
    </main>

    <script>
        let logs = [];
        let scannedSet = new Set(); // เก็บข้อมูลแบบ Unique เพื่อเช็คซ้ำ
        const html5QrCode = new Html5Qrcode("reader");
        const resultContainer = document.getElementById('result-container');
        const resultDisplay = document.getElementById('result-display');
        const countBadge = document.getElementById('count-badge');
        
        // Sound Feedback (Beep)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(frequency = 440, duration = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = frequency;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        async function startScanner() {
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
                document.getElementById('btn-start').classList.add('hidden');
                document.getElementById('btn-stop').classList.remove('hidden');
                document.getElementById('scan-indicator').classList.remove('hidden');
            } catch (err) { alert("Camera Error: " + err); }
        }

        async function stopScanner() {
            await html5QrCode.stop();
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
            document.getElementById('scan-indicator').classList.add('hidden');
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (scannedSet.has(decodedText)) {
                // กรณีข้อมูลซ้ำ (Duplicate)
                resultContainer.className = "bg-orange-950/40 p-5 rounded-3xl border border-orange-500/50 shadow-inner transition-all duration-300";
                resultDisplay.innerText = "DUPLICATE: " + decodedText;
                resultDisplay.className = "text-xl font-mono text-orange-400 break-all leading-tight";
                playBeep(220, 0.2); // เสียงต่ำเตือนว่าซ้ำ
            } else {
                // กรณีข้อมูลใหม่ (New Entry)
                scannedSet.add(decodedText);
                logs.push({
                    ID: logs.length + 1,
                    Time: new Date().toLocaleString('th-TH'),
                    Content: decodedText
                });

                resultContainer.className = "bg-emerald-950/40 p-5 rounded-3xl border border-emerald-500/50 shadow-inner transition-all duration-300";
                resultDisplay.innerText = decodedText;
                resultDisplay.className = "text-xl font-mono text-emerald-400 break-all leading-tight";
                countBadge.innerText = `Total: ${logs.length}`;
                
                playBeep(880, 0.1); // เสียงสูงยืนยันว่าสำเร็จ
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }

        function exportToCSV() {
            if (logs.length === 0) return alert("ไม่มีข้อมูล");
            const csv = Papa.unparse(logs);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Scanner_v2.2_${new Date().getTime()}.csv`;
            a.click();
        }

        function resetLogs() {
            if(confirm("ล้างข้อมูลทั้งหมด?")) {
                logs = [];
                scannedSet.clear();
                resultDisplay.innerText = "Waiting for input...";
                resultContainer.className = "bg-slate-900/80 p-5 rounded-3xl border border-slate-800 shadow-inner";
                countBadge.innerText = "Total: 0";
            }
        }
    </script>
</body>
</html>
